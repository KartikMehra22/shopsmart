services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - '5001:5001'
    environment:
      - DATABASE_URL=file:./prisma/dev.db
      - NODE_ENV=development
    volumes:
      - ./server:/app
      - /app/node_modules
    networks:
      - shopsmart-net

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    ports:
      - '3000:80'
    depends_on:
      - server
    networks:
      - shopsmart-net

networks:
  shopsmart-net:
    driver: bridge

