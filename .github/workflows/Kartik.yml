name: Kartik

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Dependencies
        run: npm install
        working-directory: ./client

      - name: Build
        run: npm run build
        working-directory: ./client

      - name: Print Secret
        env:
          myvar: ${{secrets.hello}}
        run: 
          echo "This is my Secret $myvar"

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v7
        with:
          name: my-build-artifact
          path: client/dist/
          if-no-files-found: warn
          retention-days: 1

  unit-tests:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Install Dependencies
        run: npm install
        working-directory: ./client

      - name: Run Unit Tests
        run: npm test
        working-directory: ./client

  server-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Dependencies
        run: npm install
        working-directory: ./server

      - name: Run Server Tests
        run: npm test
        working-directory: ./server
