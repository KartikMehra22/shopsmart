name: 04 Deploy to AWS EC2

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check Configuration
        id: check_secrets
        run: |
          if [ -z "${{ secrets.EC2_SSH_KEY }}" ]; then
            echo "::warning::EC2_SSH_KEY is not set — skipping deploy"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Deploy to EC2
        if: steps.check_secrets.outputs.skip == 'false'
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.EC2_HOST || vars.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME || vars.EC2_USERNAME || 'ubuntu' }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            DEPLOY_PATH="$HOME/shopsmart"
            mkdir -p $DEPLOY_PATH
            cd $DEPLOY_PATH

            if [ ! -d ".git" ]; then
                git clone https://github.com/${{ github.repository }}.git .
            fi

            git pull origin main

            if ! command -v pm2 &> /dev/null; then
                sudo npm install -g pm2
            fi

            # Setup Server (entry point is server/server.js)
            cd server
            npm install

            if pm2 describe shopsmart-server > /dev/null 2>&1; then
                pm2 restart shopsmart-server
            else
                pm2 start server.js --name shopsmart-server
            fi

            pm2 save

            # Setup Client
            cd ../client
            npm install
            npm run build

            sudo cp -r dist/* /var/www/html/