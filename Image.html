<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ShopSmart – Deployed via GitHub Actions</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #fff;
      }

      .container {
        text-align: center;
        padding: 60px 40px;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 24px;
        backdrop-filter: blur(16px);
        max-width: 680px;
        width: 90%;
        box-shadow: 0 25px 50px rgba(0, 0, 0, 0.4);
        animation: fadeUp 0.8s ease both;
      }

      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(30px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .badge {
        display: inline-block;
        background: linear-gradient(90deg, #43e97b, #38f9d7);
        color: #0f0c29;
        font-size: 0.75rem;
        font-weight: 700;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        padding: 6px 18px;
        border-radius: 100px;
        margin-bottom: 28px;
      }

      h1 {
        font-size: 2.8rem;
        font-weight: 800;
        background: linear-gradient(90deg, #a18cd1, #fbc2eb);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        margin-bottom: 16px;
        line-height: 1.2;
      }

      p.subtitle {
        font-size: 1.1rem;
        color: rgba(255, 255, 255, 0.65);
        margin-bottom: 40px;
        line-height: 1.7;
      }

      .info-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
        gap: 16px;
        margin-bottom: 40px;
      }

      .info-card {
        background: rgba(255, 255, 255, 0.07);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 14px;
        padding: 20px 16px;
        transition:
          transform 0.2s,
          background 0.2s;
      }

      .info-card:hover {
        transform: translateY(-4px);
        background: rgba(255, 255, 255, 0.12);
      }

      .info-card .icon {
        font-size: 1.8rem;
        margin-bottom: 10px;
      }

      .info-card .label {
        font-size: 0.72rem;
        font-weight: 600;
        letter-spacing: 1px;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.45);
        margin-bottom: 4px;
      }

      .info-card .value {
        font-size: 1rem;
        font-weight: 700;
        color: #fff;
      }

      .status-row {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        font-size: 0.95rem;
        color: rgba(255, 255, 255, 0.55);
      }

      .dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: #43e97b;
        animation: pulse 1.6s infinite;
      }

      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
          transform: scale(1);
        }
        50% {
          opacity: 0.4;
          transform: scale(1.3);
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="badge">✅ Deployment Successful</div>

      <h1>ShopSmart on AWS EC2</h1>

      <p class="subtitle">
        This static HTML page was automatically deployed to an
        <strong>Ubuntu EC2 instance</strong> using a
        <strong>GitHub Actions</strong> CI/CD pipeline and served via
        <strong>Nginx</strong>.
      </p>

      <div class="info-grid">
        <div class="info-card">
          <div class="icon">☁️</div>
          <div class="label">Cloud</div>
          <div class="value">AWS EC2</div>
        </div>
        <div class="info-card">
          <div class="icon">🖥️</div>
          <div class="label">OS</div>
          <div class="value">Ubuntu</div>
        </div>
        <div class="info-card">
          <div class="icon">🌐</div>
          <div class="label">Web Server</div>
          <div class="value">Nginx</div>
        </div>
        <div class="info-card">
          <div class="icon">⚙️</div>
          <div class="label">CI/CD</div>
          <div class="value">GitHub Actions</div>
        </div>
      </div>

      <div class="status-row">
        <div class="dot"></div>
        <span>Server is live and running</span>
      </div>
    </div>
  </body>
</html>
